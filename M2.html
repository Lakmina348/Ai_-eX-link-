<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Generator - AI HUB</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f4f7; padding: 20px; color: #333; }
        .main-container { max-width: 900px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-section { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { background: #0078d4; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #005a9e; }
        
        .preview-section { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .code-output { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; white-space: pre-wrap; margin-top: 15px; border: 1px solid #181a1f; position: relative; }
        .copy-btn { position: absolute; top: 5px; right: 5px; background: #444; color: #fff; font-size: 10px; padding: 5px; cursor: pointer; border-radius: 3px; }

        /* Card Style - Microsoft Store Layout */
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 15px; text-decoration: none; color: inherit; display: flex; flex-direction: column; width: 250px; margin: auto; }
        .image-box { width: 100%; height: 140px; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; background-color: #f3f3f3; overflow: hidden; }
        .image-box img { width: 80px; height: 80px; object-fit: contain; }
        .card h3 { margin: 0 0 5px 0; font-size: 16px; font-weight: 600; }
        .rating { color: #616161; font-size: 12px; margin-bottom: 10px; }
        .stars { color: #333; margin-right: 5px; }
        .description { font-size: 12px; color: #616161; line-height: 1.4; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="form-section">
        <h3>Card Details Athulath Karanna</h3>
        <input type="text" id="extName" placeholder="Extension Name (Ex: Video DownloadHelper)">
        <input type="text" id="extLink" placeholder="Extension Store Link">
        <input type="text" id="extImg" placeholder="Image Link (Direct Link)">
        <textarea id="extDesc" placeholder="Description එක මෙතන ලියන්න..." rows="3"></textarea>
        <button onclick="generateCard()">Generate Card & Code</button>
    </div>

    <div class="preview-section">
        <h3>Preview</h3>
        <div id="cardPreview">
            </div>
        
        <div class="code-output" id="codeContainer" style="display:none;">
            <div class="copy-btn" onclick="copyCode()">COPY</div>
            <code id="finalCode"></code>
        </div>
    </div>
</div>

<script>
function generateCard() {
    const name = document.getElementById('extName').value || "Extension Name";
    const link = document.getElementById('extLink').value || "#";
    const img = document.getElementById('extImg').value || "https://via.placeholder.com/80";
    const desc = document.getElementById('extDesc').value || "Description ekak methana thivevi.";

    const cardHtml = `<a href="${link}" target="_blank" class="card">
    <div class="image-box">
        <img src="${img}" alt="${name}">
    </div>
    <h3>${name}</h3>
    <div class="rating">
        <span class="stars">
            <i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i><i class="fas fa-star"></i>
        </span>
        (10,000+)
    </div>
    <p class="description">${desc}</p>
</a>`;

    document.getElementById('cardPreview').innerHTML = cardHtml;
    document.getElementById('finalCode').innerText = cardHtml;
    document.getElementById('codeContainer').style.display = 'block';
}

function copyCode() {
    const code = document.getElementById('finalCode').innerText;
    navigator.clipboard.writeText(code);
    alert("Code eka copy kala!");
}
</script>

</body>
</html>
